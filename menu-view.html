<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aaromale | Menu</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--bg-dark);
            padding: 2rem;
            min-height: 100vh;
        }
        .header-actions {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 2rem;
        }
        .menu-image-container {
            max-width: 1200px;
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid var(--border-color);
        }
        .menu-image-container img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <div class="header-actions">
        <a href="index.html#menu" class="btn btn-outline">
            <i class="fas fa-arrow-left" style="margin-right: 8px;"></i> Back
        </a>
        <a href="assets/images/menu.jpg" download="Aaromale_Menu.jpg" class="btn btn-primary">
            <i class="fas fa-download" style="margin-right: 8px;"></i> Download PDF / Image
        </a>
    </div>

    <div class="menu-image-container">
        <!-- We use the image you attached, please save it as menu.jpg in assets/images/ -->
        <img src="assets/images/menu.jpg" alt="Aaromale Full Menu">
    </div>

</body>
</html>
